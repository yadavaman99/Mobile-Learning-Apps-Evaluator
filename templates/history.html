<!DOCTYPE html>
<html>
<head>
    <title>My Dashboard</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a2e; color: white; padding: 40px; }
        .card { background: rgba(255,255,255,0.05); padding: 30px; border-radius: 20px; border: 1px solid rgba(255,255,255,0.1); }
        table { width: 100%; border-collapse: collapse; margin-top: 30px; }
        th, td { padding: 15px; border-bottom: 1px solid rgba(255,255,255,0.1); text-align: left; }
        .btn-comp { background: #4facfe; color: white; padding: 10px 20px; border-radius: 12px; border: none; cursor: pointer; font-weight: 600; }
        .btn-clear { color: #ff4d4d; text-decoration: none; font-size: 13px; margin-left: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h1>{{ user_name }}'s Activity</h1>
            <a href="/" style="color:#ffd369; text-decoration:none;">← Back to Search</a>
        </div>
        <div style="max-width:300px; margin:auto;"><canvas id="myChart"></canvas></div>
    </div>

    <form action="/compare" method="POST" class="card" style="margin-top:30px;">
        <div style="display:flex; justify-content:space-between; align-items:center;">
            <h2>Analysis History</h2>
            <div>
                <button type="submit" class="btn-comp">Compare Selected (2)</button>
                <a href="/clear" class="btn-clear" onclick="return confirm('Delete history?')">🗑 Clear All</a>
            </div>
        </div>
        <table>
            <thead><tr><th>Select</th><th>App Name</th><th>Category</th><th>Rating</th></tr></thead>
            <tbody>
                {% for item in history %}
                <tr>
                    <td><input type="checkbox" name="compare_ids" value="{{ item.id }}"></td>
                    <td>{{ item.app_name }}</td>
                    <td>{{ item.category }}</td>
                    <td>{{ item.impact }}</td>
                </tr>
                {% endfor %}
            </tbody>
        </table>
    </form>

    <script>
        const stats = JSON.parse('{{ stats|safe }}');
        new Chart(document.getElementById('myChart'), {
            type: 'doughnut',
            data: {
                labels: Object.keys(stats),
                datasets: [{ data: Object.values(stats), backgroundColor: ['#ff7eb3', '#ffd369', '#4facfe', '#00f2fe', '#a8edea'] }]
            },
            options: { plugins: { legend: { labels: { color: 'white' } } } }
        });
    </script>
</body>
</html>
