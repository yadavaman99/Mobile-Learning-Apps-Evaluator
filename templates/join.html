<!DOCTYPE html>
<html>
<head>
    <title>Get Started | Smart App Evaluator</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary-blue: #00d2ff;
            --deep-blue: #3a7bd5;
            --dark-bg: #0f172a;
        }

        body { 
            margin:0; 
            font-family:'Poppins', sans-serif; 
            background: radial-gradient(circle at top right, #1e3a8a, #0f172a, #1e40af);
            color:white; 
            display:flex; 
            align-items:center; 
            justify-content:center; 
            height:100vh; 
        }

        .box { 
            background:rgba(255,255,255,0.05); 
            padding:50px; 
            border-radius:30px; 
            backdrop-filter:blur(20px); 
            text-align:center; 
            border:1px solid rgba(255,255,255,0.1); 
            box-shadow: 0 20px 50px rgba(0,0,0,0.6); 
            width: 100%;
            max-width: 400px;
        }

        h1 { 
            font-size: 2.8em; 
            margin-bottom: 10px; 
            background: linear-gradient(to right, #fff, var(--primary-blue));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 600;
        }

        p { opacity:0.7; margin-bottom:35px; font-weight: 300; letter-spacing: 0.5px; }

        input { 
            padding:15px 20px; 
            width:100%; 
            border-radius:15px; 
            border: 2px solid rgba(0, 210, 255, 0.2); 
            background: rgba(15, 23, 42, 0.6);
            margin-bottom:25px; 
            font-size:16px; 
            outline:none; 
            color: white;
            box-sizing: border-box;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--primary-blue);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.3);
        }

        button { 
            padding:14px 40px; 
            width: 100%;
            border-radius:15px; 
            border:none; 
            background: linear-gradient(45deg, var(--deep-blue), var(--primary-blue));
            color:white; 
            font-weight:600; 
            cursor:pointer; 
            font-size:16px; 
            transition: 0.3s;
            box-shadow: 0 4px 15px rgba(0, 210, 255, 0.3);
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 210, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="box">
        <h1>Smart App Evaluator</h1>
        <p>Smart Application Intelligence Dashboard</p>
        
        <form method="POST">
            <input type="text" name="user_name" placeholder="Enter your name" required autocomplete="off">
            <button type="submit">Access Dashboard</button>
        </form>
    </div>
</body>
</html>
